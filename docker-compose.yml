services:
  # ── FastAPI backend ──────────────────────────────────────────────────
  api:
    build: .
    container_name: industrialmind-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=industrialmind
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - uploads:/tmp/uploads
    restart: unless-stopped

  # ── Neo4j graph database ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: industrialmind-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/industrialmind
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── ChromaDB vector store ────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: industrialmind-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

volumes:
  uploads:
  neo4j_data:
  neo4j_logs:
  chroma_data:
